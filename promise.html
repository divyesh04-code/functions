        // Example 7: 
        function loginUser(username, password){
            return new Promise(function(resolve, reject){
                if(username === "admin" && password === "1234"){
                    resolve("Login Successful ✅");
                } else {
                    reject("Invalid Credentials ❌");
                }
            });
        }
