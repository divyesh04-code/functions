<body>
    <script>

        // 1️⃣ Rest Operator in Array Destructuring
        let numbers = [10, 20, 30, 40, 50];
        // let [a, b, ...rest] = numbers;

        // console.log(a);    // 10
        // console.log(b);    // 20
        // console.log(rest); // [30, 40, 50]

        // 2️⃣ Rest Operator in Function Parameters
        function sum(...numbers) {
            let total = 0;

            for(let num of numbers) {
                total += num;
            }

            return total;
        }

        console.log(sum(10, 20, 30));      // 60
        console.log(sum(5, 15, 25, 35));   // 80

        // 3️⃣ Rest Operator in Object Destructuring
        let student = {
            name: "Divyesh",
            age: 22,
            city: "Surat",
            country: "India"
        };

        let { name, ...rest} = student;

        console.log(name);  // Divyesh
        console.log(rest);  // { age: 22, city: "Surat", country: "India" }
    </script>
